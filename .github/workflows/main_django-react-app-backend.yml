# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure App Service: https://aka.ms/python-webapps-actions

name: Build and deploy Python app to Azure Web App - django-react-app-backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create and start virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate
      
      - name: Install dependencies

        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      - name: Run database migrations
        run: |
          cd backend
          python manage.py migrate

      - name: Collect static files
        run: |
          cd backend
          python manage.py collectstatic --noinput

      # Optional: Add step to run tests here (PyTest, Django test suites, etc.)
      - name: Zip artifacts for development
        run: |
          cd backend
          powershell Compress-Archive -Path * -DestinationPath release.zip

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            backend/release.zip
            !venv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6CCA14D1BC48470C8C72949BC6941A64 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E84FDC7BDCAA47E7BBF6AA869329398A }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_74330B59BA3B466D8BAC0C1EB0ED73DE }}

      - name: Verify artifact content
        run: |
          unzip -l backend/release.zip

      - name: Debug environment variables
        run: |
          echo "Client ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6CCA14D1BC48470C8C72949BC6941A64 }}"
          echo "Tenant ID: ${{ secrets.AZUREAPPSERVICE_TENANTID_E84FDC7BDCAA47E7BBF6AA869329398A }}"
          echo "Subscription ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_74330B59BA3B466D8BAC0C1EB0ED73DE }}"

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'django-react-app-backend'
          slot-name: 'Production'
          package: backend/release.zip
